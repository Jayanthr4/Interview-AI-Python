<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}InterviewAI Pro{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            indigo: { 50:'#eef2ff',100:'#e0e7ff',600:'#4f46e5',700:'#4338ca' },
          }
        }
      }
    }
  </script>
  <style>
    .mirror { transform: scaleX(-1); }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .animate-pulse-dot { animation: pulse-dot 1s ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">

  <!-- ── Navigation ── -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <a href="/" class="flex items-center space-x-2">
          <div class="bg-indigo-600 p-2 rounded-lg">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
          </div>
          <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">
            InterviewAI Pro
          </span>
        </a>

        <nav class="hidden md:flex space-x-8">
          <a href="/" class="text-slate-600 hover:text-indigo-600 font-medium transition-colors">Home</a>
          <a href="/start" class="text-slate-600 hover:text-indigo-600 font-medium transition-colors">Start Interview</a>
          <a href="/admin" class="text-slate-600 hover:text-indigo-600 font-medium transition-colors">Admin Dashboard</a>
          <a href="/report-lookup" class="text-slate-600 hover:text-indigo-600 font-medium transition-colors">Reports</a>
        </nav>

        <!-- Mobile menu toggle -->
        <button id="menuBtn" class="md:hidden p-2">
          <svg id="iconMenu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg id="iconClose" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="mobileMenu" class="hidden md:hidden bg-white border-b border-slate-200 px-4 py-4 space-y-4">
      <a href="/" class="block text-slate-600 font-medium">Home</a>
      <a href="/start" class="block text-slate-600 font-medium">Start Interview</a>
      <a href="/admin" class="block text-slate-600 font-medium">Admin Dashboard</a>
      <a href="/report-lookup" class="block text-slate-600 font-medium">Reports</a>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main class="flex-grow">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer class="bg-white border-t border-slate-200 py-8">
    <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
      &copy; <span id="year"></span> InterviewAI Pro. All rights reserved.
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const iconMenu = document.getElementById('iconMenu');
    const iconClose = document.getElementById('iconClose');
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      iconMenu.classList.toggle('hidden');
      iconClose.classList.toggle('hidden');
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
